<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c3e50">
    <meta name="description" content="Track your caffeine intake and see current levels">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Caffeine">
    <title>Caffeine Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <!-- Current caffeine level display -->
        <header class="level-display">
            <p class="level-label">Current caffeine in system</p>
            <p class="level-amount" id="current-level">0.0 mg</p>
            <p class="level-status" id="level-status">—</p>
            <div class="level-bar-track">
                <div class="level-bar" id="level-bar"></div>
            </div>
            <p class="level-updated" id="last-updated"></p>
        </header>

        <!-- Quick entry presets -->
        <section class="presets-section">
            <h2 class="section-title">Quick Add</h2>
            <div class="presets-grid">
                <button type="button" class="btn-preset" data-amount="200" data-source="Celsius"><span class="preset-name">Celsius</span><span class="preset-mg">200mg</span></button>
                <button type="button" class="btn-preset" data-amount="100" data-source="Huel"><span class="preset-name">Huel</span><span class="preset-mg">100mg</span></button>
                <button type="button" class="btn-preset" data-amount="120" data-source="Neutonic"><span class="preset-name">Neutonic</span><span class="preset-mg">120mg</span></button>
                <button type="button" class="btn-preset" data-amount="160" data-source="Tenzing Mango"><span class="preset-name">Tenzing</span><span class="preset-mg">160mg</span></button>
            </div>
            <div id="preset-toast" class="preset-toast" aria-live="polite"></div>
        </section>

        <!-- Log caffeine form -->
        <section class="log-section">
            <h2 class="section-title">Custom Entry</h2>
            <form id="log-form">
                <div class="form-group">
                    <label for="amount">Amount (mg)</label>
                    <input type="number" id="amount" name="amount" min="1" max="2000"
                           placeholder="e.g. 95" required>
                </div>
                <div class="form-group">
                    <label for="time">Time consumed</label>
                    <input type="time" id="time" name="time" required>
                </div>
                <div class="form-group">
                    <label for="source">Source (optional)</label>
                    <input type="text" id="source" name="source" placeholder="e.g. Coffee, Espresso">
                </div>
                <button type="submit" class="btn btn-primary">Log Caffeine</button>
            </form>
        </section>

        <!-- Daily summary -->
        <section class="summary-section">
            <h2 class="section-title">Today's Summary</h2>
            <div class="summary-grid">
                <div class="summary-card">
                    <span class="summary-value" id="summary-total">—</span>
                    <span class="summary-label">Total consumed</span>
                </div>
                <div class="summary-card">
                    <span class="summary-value" id="summary-peak">—</span>
                    <span class="summary-label">Peak level</span>
                </div>
                <div class="summary-card">
                    <span class="summary-value" id="summary-peak-time">—</span>
                    <span class="summary-label">Peak at</span>
                </div>
            </div>
        </section>

        <!-- Weekly chart -->
        <section class="chart-section">
            <h2 class="section-title">Last 7 Days</h2>
            <canvas id="weekly-chart" height="160"></canvas>
        </section>

        <!-- Recent entries list -->
        <section class="history-section">
            <h2 class="section-title">Recent Entries</h2>
            <ul class="entry-list" id="entry-list">
                <li class="entry-empty">No entries yet. Log your first caffeine above!</li>
            </ul>
        </section>

        <!-- Half-life settings -->
        <section class="settings-section">
            <h2 class="section-title">Settings</h2>
            <div class="halflife-row">
                <label for="halflife-input">Half-life (hours)</label>
                <input type="number" id="halflife-input" min="1" max="24" step="0.5">
                <button type="button" class="btn-save" id="halflife-save">Save</button>
                <button type="button" class="btn-reset" id="halflife-reset">Reset</button>
            </div>
            <p class="halflife-note">Default is 5 hours. Caffeine half-life varies by individual (typically 3–7 hrs).</p>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
